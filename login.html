<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetería - Iniciar Sesión</title>
    <link rel="stylesheet" href="build/css/app.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #333 0%, #555 100%);
        }

        .login-container {
            background: white;
            border-radius: 1rem;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo img {
            width: 100px;
            height: auto;
        }

        .login-title {
            text-align: center;
            font-size: 2rem;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            text-align: center;
            color: #666;
            font-size: 1.4rem;
            margin-bottom: 2rem;
        }

        .login-form .campo {
            margin-bottom: 1.5rem;
        }

        .login-form label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #333;
        }

        .login-form input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #ddd;
            border-radius: 0.5rem;
            font-size: 1.6rem;
            transition: border-color 0.2s;
        }

        .login-form input:focus {
            border-color: #e9a84b;
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 1.2rem;
            background: #e9a84b;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1.6rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: #d4922e;
        }

        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .login-error {
            background: #f8d7da;
            color: #721c24;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
        }

        .login-footer {
            text-align: center;
            margin-top: 2rem;
            color: #999;
            font-size: 1.2rem;
        }

        .demo-credentials {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            font-size: 1.2rem;
            color: #666;
        }

        .demo-credentials strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <img src="build/img/logo.svg" alt="logo cafeteria">
        </div>
        <h1 class="login-title">Bienvenido</h1>
        <p class="login-subtitle">Inicia sesión para continuar</p>

        <div id="login-error" class="login-error"></div>

        <form id="login-form" class="login-form">
            <div class="campo">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="tu@email.com" required>
            </div>
            <div class="campo">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" placeholder="Tu contraseña" required>
            </div>
            <button type="submit" id="btn-login" class="btn-login">Iniciar Sesión</button>
        </form>

        <div class="login-footer">
            <div class="demo-credentials">
                <strong>Cuentas de prueba:</strong><br>
                admin.pablo36115@gmail.com / 123456<br>
                mesero.pablo36115@gmail.com / 123456<br>
                cajero.pablo36115@gmail.com / 123456<br>
                gerente.pablo36115@gmail.com / 123456
            </div>
        </div>
    </div>

    <script type="module">
        import { authService } from './src/services/auth.service.js';

        const form = document.getElementById('login-form');
        const errorDiv = document.getElementById('login-error');
        const btnLogin = document.getElementById('btn-login');

        const REDIRECT_MAP = {
            'Administrador': 'administrador.html',
            'Mesero': 'mesero.html',
            'Cajero': 'cajero.html',
            'Gerente': 'gerente.html',
            'Cocinero': 'cocinero.html'
        };

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            errorDiv.style.display = 'none';
            btnLogin.disabled = true;
            btnLogin.textContent = 'Iniciando sesión...';

            try {
                const response = await authService.login(email, password);
                
                if (response.data) {
                    authService.saveSession(response.data);
                    
                    const rol = response.data.rol?.nombre;
                    const paginaDestino = REDIRECT_MAP[rol];

                    if (paginaDestino) {
                        window.location.href = paginaDestino;
                    } else {
                        mostrarError('Rol no reconocido: ' + rol);
                    }
                } else {
                    mostrarError('Credenciales inválidas');
                }
            } catch (error) {
                mostrarError(error.message || 'Error al iniciar sesión');
            } finally {
                btnLogin.disabled = false;
                btnLogin.textContent = 'Iniciar Sesión';
            }
        });

        function mostrarError(mensaje) {
            errorDiv.textContent = mensaje;
            errorDiv.style.display = 'block';
        }

        // Si ya está logueado, redirigir
        if (authService.isAuthenticated()) {
            const rol = authService.getRol();
            const paginaDestino = REDIRECT_MAP[rol];
            if (paginaDestino) {
                window.location.href = paginaDestino;
            }
        }
    </script>
</body>
</html>
