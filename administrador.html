<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetería - Gestión de Inventario</title>
    <link rel="stylesheet" href="build/css/app.css">
    <style>
       
        .grid-formulario-inventario {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            align-items: center;
        }
        .tabla-inventario {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
            margin-bottom: 4rem;
            text-align: left;
        }
        .tabla-inventario th {
            background-color: #333;
            color: white;
            padding: 1.5rem;
            font-size: 1.8rem;
        }
        .tabla-inventario td {
            padding: 1.5rem;
            border-bottom: 1px solid #ccc;
            font-size: 1.6rem;
        }
        .tabla-inventario tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .estado-critico {
            color: #d9534f;
            font-weight: bold;
        }
        .estado-optimo {
            color: #5cb85c;
            font-weight: bold;
        }
        .btn-pequeno {
            padding: 0.5rem 1rem;
            font-size: 1.4rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            margin-right: 0.5rem;
            color: white;
            text-transform: uppercase;
            font-weight: bold;
        }
        .btn-editar {
            background-color: #e9a84b; /* Color principal de tu web */
        }
        .btn-eliminar {
            background-color: #d9534f;
        }
    </style>
</head>
<body>
    <header class="header header-inicio">
        <div class="contenido-header contenedor">
            <div class="barra">
                <div class="logo">
                    <img src="build/img/logo.svg" alt="logo cafeteria">
                </div>

                <nav class="nav-principal">
                    <a href="index.html">Inicio</a>
                    <a href="nosotros.html">Nosotros</a>
                 <!--   <a href="proceso.html">Proceso</a>-->
                    <a href="menu.html">Menú</a>
                    <a href="galeria.html">Galería</a>
                    <a href="contacto.html">Contacto</a>
                    <a href="mesero.html">Mesero</a>
                    <a href="cajero.html">Cajero</a>
                    <a href="gerente.html">Gerente</a>
                    <a class="activo" href="administrador.html">Administrador</a>
                

                </nav>
            </div>

            <div class="texto-header">
                <h1>Disfruta una deliciosa taza de café</h1>
            </div>
        </div>
     </header>

    <main class="contenedor contenido-principal">
        <h2>Registrar Nuevo Producto</h2>
        
        <form class="formulario" id="form-producto">
            <fieldset>
                <legend>Datos del Producto</legend>
                <div class="grid-formulario-inventario">
                    <div class="campo">
                        <label for="nombre">Nombre:</label>
                        <input type="text" id="nombre" placeholder="Ej. Café Americano" required>
                    </div>
                    <div class="campo">
                        <label for="precio">Precio ($):</label>
                        <input type="number" id="precio" placeholder="Ej. 3.50" step="0.01" min="0" required>
                    </div>
                    <div class="campo">
                        <label for="cantidad">Cantidad en Stock:</label>
                        <input type="number" id="cantidad" placeholder="Ej. 10" min="0" required>
                    </div>
                    <div class="campo">
                        <label for="categoria">Categoría:</label>
                        <select id="categoria" required>
                            <option value="" disabled selected>-- Cargando... --</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <div class="alinear-derecha">
                <button type="submit" class="btn" id="btn-guardar">Añadir Producto</button>
                <button type="button" class="btn" id="btn-cancelar" style="display: none; background: #666;">Cancelar</button>
            </div>
        </form>

        <div id="mensaje-feedback" style="margin: 1rem 0; padding: 1rem; border-radius: 0.5rem; display: none;"></div>

        <h2>Productos en Inventario</h2>
        <table class="tabla-inventario">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-productos">
                <tr><td colspan="6" style="text-align:center">Cargando...</td></tr>
            </tbody>
        </table>
    </main>

    <footer class="footer">
        <div class="contenedor contenido-footer">
            <div class="footer-box">
                <h3>Cafetería</h3>
                <p>Sistema interno - Rol de Administrador</p>
            </div>
        </div>
    </footer>

    <script>
        const API_BASE = 'http://localhost:3800/api';
        let productoEditando = null;

        async function cargarCategorias() {
            try {
                const res = await fetch(`${API_BASE}/categorias`);
                const json = await res.json();
                const categorias = json.data || [];
                const select = document.getElementById('categoria');
                select.innerHTML = '<option value="" disabled selected>-- Seleccione --</option>' +
                    categorias.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
            } catch (error) {
                console.error('Error cargando categorías:', error);
            }
        }

        async function cargarProductos() {
            try {
                const res = await fetch(`${API_BASE}/productos`);
                const json = await res.json();
                const productos = json.data || [];
                const tbody = document.getElementById('tabla-productos');
                
                if (productos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No hay productos</td></tr>';
                    return;
                }

                tbody.innerHTML = productos.map(p => `
                    <tr>
                        <td>${p.nombre}</td>
                        <td>${p.categoria?.nombre || '-'}</td>
                        <td>$${p.precio.toFixed(2)}</td>
                        <td>${p.cantidad}</td>
                        <td class="${p.estado ? 'estado-optimo' : 'estado-critico'}">${p.estado ? 'Activo' : 'Inactivo'}</td>
                        <td>
                            <button class="btn-pequeno btn-editar" onclick="editarProducto(${p.id}, '${p.nombre}', ${p.precio}, ${p.cantidad}, ${p.categoria_id})">Editar</button>
                            <button class="btn-pequeno btn-eliminar" onclick="eliminarProducto(${p.id})">Borrar</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error cargando productos:', error);
            }
        }

        document.getElementById('form-producto').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const payload = {
                nombre: document.getElementById('nombre').value,
                precio: parseFloat(document.getElementById('precio').value),
                cantidad: parseInt(document.getElementById('cantidad').value),
                categoria_id: parseInt(document.getElementById('categoria').value),
                estado: true
            };

            try {
                let res;
                if (productoEditando) {
                    res = await fetch(`${API_BASE}/productos/${productoEditando}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } else {
                    res = await fetch(`${API_BASE}/productos`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }

                if (res.ok) {
                    mostrarMensaje(productoEditando ? 'Producto actualizado' : 'Producto creado', 'success');
                    resetForm();
                    cargarProductos();
                } else {
                    const err = await res.json();
                    mostrarMensaje(err.mensaje || 'Error', 'error');
                }
            } catch (error) {
                mostrarMensaje('Error de conexión', 'error');
            }
        });

        function editarProducto(id, nombre, precio, cantidad, categoriaId) {
            productoEditando = id;
            document.getElementById('nombre').value = nombre;
            document.getElementById('precio').value = precio;
            document.getElementById('cantidad').value = cantidad;
            document.getElementById('categoria').value = categoriaId;
            document.getElementById('btn-guardar').textContent = 'Actualizar Producto';
            document.getElementById('btn-cancelar').style.display = 'inline-block';
        }

        async function eliminarProducto(id) {
            if (!confirm('¿Eliminar este producto?')) return;
            try {
                const res = await fetch(`${API_BASE}/productos/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    mostrarMensaje('Producto eliminado', 'success');
                    cargarProductos();
                } else {
                    mostrarMensaje('Error al eliminar', 'error');
                }
            } catch (error) {
                mostrarMensaje('Error de conexión', 'error');
            }
        }

        document.getElementById('btn-cancelar').addEventListener('click', resetForm);

        function resetForm() {
            productoEditando = null;
            document.getElementById('form-producto').reset();
            document.getElementById('btn-guardar').textContent = 'Añadir Producto';
            document.getElementById('btn-cancelar').style.display = 'none';
        }

        function mostrarMensaje(texto, tipo) {
            const el = document.getElementById('mensaje-feedback');
            el.textContent = texto;
            el.style.display = 'block';
            el.style.backgroundColor = tipo === 'success' ? '#d4edda' : '#f8d7da';
            el.style.color = tipo === 'success' ? '#155724' : '#721c24';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        cargarCategorias();
        cargarProductos();
    </script>
</body>
</html>
